<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Robot Landing</title>
  <link rel="stylesheet" href="front.css">
</head>
<body>

  <!-- 🔥 TOP BANNER -->
  <div class="top-banner">
    <div class="banner-track">
      <span>🚨 PROJECT Z is a project using HTML • CSS • JAVA SCRIPT • PYTHON</span>
      <span>🚨 PROJECT Z is a project using HTML • CSS • JAVA SCRIPT • PYTHON</span>
      <span>🚨 PROJECT Z is a project using HTML • CSS • JAVA SCRIPT • PYTHON</span>
    </div>
  </div>

  <!-- 🌌 STAR BACKGROUND -->
  <div class="stars"></div>
  <div class="stars2"></div>
  <div class="stars3"></div>

  <!-- BACKGROUND -->
  <img class="image-gradient" src="gradient.png" alt="gradient">
  <div class="layer-blur"></div>

  <!-- CENTER LOGO -->
  <img class="center-image" src="logo.png" alt="center image">

  <!-- HERO -->
  <section class="hero" id="home">
    <img id="robot" src="robo.png" alt="Robot">
    <a href="login.html" class="cta">LOGIN</a>
  </section>

  <!-- 🤖 MOUSE FOLLOW SCRIPT -->
  <script>
    const robot = document.getElementById("robot");

    document.addEventListener("mousemove", (e) => {
      const x = (e.clientX / window.innerWidth - 0.5) * 40;
      const y = (e.clientY / window.innerHeight - 0.5) * 40;

      robot.style.transform = `translate(${x}px, ${y}px) scale(1)`;
    });
  </script>

</body>
</html>
