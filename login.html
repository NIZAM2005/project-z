<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Login And Registration Form Using HTML CSS & Javascript | Codehal</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="login.css">

    <header>
        <a href="front.html" data-aos="fade-down" data-aos-duration="1500" class="btn-home">BACK</a>
    </header>

</head>

<body>
    
    <img class="image-gradient" src="gradient.png" alt="gradient">
    <div class="layer-blur"></div>

    <!-- Logged In Popup -->
<input type="checkbox" id="popup-toggle">

<div class="popup">
    <div class="popup-content">
        <h2>✅ Logged In!</h2>
        <p>Welcome back to the website.</p>
        <label for="popup-toggle" class="close-btn" onclick="window.location.href='index.html'">
    Close
</label>
    </div>
</div>

    <div class="container">
        <div class="form-box login">
            <form action="">
                <h1>LOGIN</h1>
                <div class="input-box">
                    <input type="text" placeholder="username" required>
                    <i class="bx bx-user"></i>
                </div>
                <div class="input-box">
                    <input type="password" placeholder="password" required>
                    <i class="bx bx-lock"></i>
                </div>
                <div class="forgot-link">
                    <a href="#">Forgot password?</a>
                </div>
                <button type="submit" class="btn">Login</button>
            </form>
        </div>

    <div class="form-box register">
            <form action="">
                <h1>REGISTER</h1>
                <div class="input-box">
                    <input type="text" placeholder="username" required>
                    <i class="bx bx-user"></i>
                </div>
                <div class="input-box">
                    <input type="email" placeholder="Email" required>
                    <i class="bx bx-envelope"></i> 
                </div>
                <div class="input-box">
                    <input type="password" placeholder="password" required>
                    <i class="bx bx-lock"></i>
                </div> 
                <button type="submit" class="btn">Register</button>
            </form>
        </div>

       <div class="toggle-box">
        <div class="toggle-panel toggle-left">
            <h1>Hello Welcome!</h1>
            <p>Dont have an account?</p>
            <button class="btn register-btn">Register</button>
        </div>
        <div class="toggle-panel toggle-right">
            <h1>Welcome Back!</h1>
            <p>Already have an account?</p>
            <button class="btn login-btn">Login</button>
        </div>
       </div>

    </div>

    <script src="login.js"></script>
    
</body>

</html>
