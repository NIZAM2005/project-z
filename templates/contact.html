<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | PROJECT Z</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='contact.css') }}">
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<img class="image-gradient" src="{{ url_for('static', filename='gradient.png') }}">
<div class="layer-blur"></div>

<!-- ✅ HEADER UPDATED -->
<header>
    <h1 class="logo">PROJECT Z</h1>

    <div class="header-buttons">
        <a href="{{ url_for('home') }}" class="btn-back">BACK</a>
    </div>
</header>

<main>
    <div class="contact-box" data-aos="fade-zoom-in" data-aos-duration="1500">

        <h2>📩 Get in Touch</h2>
        <p>We’d love to hear from you</p>

        <form method="POST">
            <input type="text" name="name" placeholder="Your Name" required>
            <input type="email" name="email" placeholder="Your Email" required>
            <textarea name="message" rows="5" placeholder="Your Message..." required></textarea>
            <button type="submit">Send Message</button>
        </form>

        {% if success %}
            <p class="success">✅ Message Sent Successfully!</p>
        {% endif %}

        <!-- SOCIAL MEDIA -->
        <div class="social-icons">

            <a href="https://www.instagram.com/nizam.yk?igsh=bHAxamloNmtzejho&utm_source=qr" target="_blank" class="icon instagram">
                <i class="fab fa-instagram"></i>
            </a>

            <a href="https://wa.me/918590722823" target="_blank" class="icon whatsapp">
                <i class="fab fa-whatsapp"></i>
            </a>

            <a href="https://www.linkedin.com/in/muhammed-nizam-ansar-947296394/" target="_blank" class="icon linkedin">
                <i class="fab fa-linkedin"></i>
            </a>

            <a href="mailto:maynizam15mail@gmail.com" target="_blank" class="icon mail">
                <i class="fas fa-envelope"></i>
            </a>

        </div>

    </div>
</main>

<script src="https://unpkg.com/aos@next/dist/aos.js"></script>
<script>
    AOS.init();
</script>

</body>
</html>
