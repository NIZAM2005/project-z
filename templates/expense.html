<!DOCTYPE html>
<html lang="en">
<head>
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='expense.css') }}">
</head>

<body>

<!-- ✅ HEADER (MATCHES OTHER PAGES) -->
<header>
    <h1 class="logo">PROJECT Z</h1>

    <div class="header-buttons">
        <a href="{{ url_for('home') }}" class="btn-back">BACK</a>
    </div>
</header>

<!-- BACKGROUND -->
<img class="image-gradient" src="{{ url_for('static', filename='gradient.png') }}" alt="gradient">
<div class="layer-blur"></div>

<div class="container">

    <h1>💰 Expense Tracker</h1>

    <form action="/add" method="POST">
        <input type="text" name="name" placeholder="Expense name" required>
        <input type="number" step="0.01" name="amount" placeholder="Amount" required>
        <button type="submit">Add</button>
    </form>

    <h2>📋 Expenses</h2>

    <ul>
        {% for i, name, amount in expenses %}
            <li>
                {{ name }} - ₹{{ amount }}
                <a href="/delete/{{ i }}" class="delete">🗑</a>
            </li>
        {% endfor %}
    </ul>

    <h3>💰 Total: ₹{{ total }}</h3>

</div>

</body>
</html>
