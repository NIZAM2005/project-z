<!DOCTYPE html>
<html lang="en">
<head>
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='expense.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<header>
    <h1 class="logo">PROJECT Z</h1>
    <div class="header-buttons">
        <a href="{{ url_for('home') }}" class="btn-back">BACK</a>
    </div>
</header>

<img class="image-gradient" src="{{ url_for('static', filename='gradient.png') }}">
<div class="layer-blur"></div>

<div class="main-layout">

    <!-- LEFT SIDE -->
    <div class="left-panel">
        <h1>💰 Expense Tracker</h1>

        <form action="/add" method="POST" class="form">
            <input type="text" name="name" placeholder="Expense name" required>
            <input type="number" step="0.01" name="amount" placeholder="Amount" required>

            <!-- ✅ CATEGORY + DATE SIDE BY SIDE -->
            <div class="row">
                <select name="category">
                    <option>Food</option>
                    <option>Transport</option>
                    <option>Shopping</option>
                    <option>Other</option>
                </select>

                <!-- ✅ DATE INPUT -->
                <input type="date" name="date" required>
            </div>

            <button type="submit">Add</button>
        </form>

        <h2 style="margin-top:15px;">TOTAL : ₹{{ total }}</h2>

        <h2>📋 Expenses</h2>

        <ul class="expense-list">
            {% for i, name, amount, category, date in expenses %}
            <li class="expense-item">
                <span class="name">{{ name }}</span>
                <span class="category">{{ category }}</span>
                <span class="date">{{ date }}</span>

                <div class="right">
                    ₹{{ amount }}
                    <a href="/delete/{{ i }}" class="delete">🗑</a>
                </div>
            </li>
            {% endfor %}
        </ul>
    </div>

    <!-- RIGHT SIDE -->
    <div class="right-wrapper">

        <div class="right-panel">
            <h2>📊 Spending</h2>
            <canvas id="expenseChart"></canvas>
            <div class="percent-list" id="percentList"></div>
        </div>

        <button onclick="downloadExpenses()" class="download-btn">
            Download Report
        </button>

    </div>

</div>

<script>
    const data = {{ category_data | tojson }};
    const labels = Object.keys(data);
    const values = Object.values(data);

    const total = values.reduce((a, b) => a + b, 0);

    const ctx = document.getElementById('expenseChart').getContext('2d');

    new Chart(ctx, {
        type: 'pie',
        data: {
            labels: labels,
            datasets: [{
                data: values,
                backgroundColor: [
                    '#22c55e',
                    '#3b82f6',
                    '#f59e0b',
                    '#ef4444'
                ]
            }]
        },
        options: {
            plugins: {
                legend: { display: false }
            }
        }
    });

    const percentList = document.getElementById("percentList");

    labels.forEach((label, i) => {
        const percent = ((values[i] / total) * 100).toFixed(1);

        const div = document.createElement("div");
        div.className = "percent-item";
        div.innerHTML = `${label}: ${percent}%`;

        percentList.appendChild(div);
    });

    function downloadExpenses() {
        let text = "Expense Report\n\n";

        {% for i, name, amount, category, date in expenses %}
        text += "Name: {{ name }} | Category: {{ category }} | Date: {{ date }} | Amount: ₹{{ amount }}\n";
        {% endfor %}

        text += "\nTotal: ₹{{ total }}";

        const blob = new Blob([text], { type: "text/plain" });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "expenses.txt";
        link.click();
    }
</script>

</body>
</html>
