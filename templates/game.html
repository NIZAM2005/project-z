<!DOCTYPE html>
<html>
<head>
    <title>Tic Tac Toe</title>
    
    <!-- ✅ FIXED CSS ROUTE -->
    <link rel="stylesheet" href="{{ url_for('static', filename='game.css') }}">
</head>

<body>

<!-- ✅ HEADER (MATCHES OTHER PAGES) -->
<header>
    <h1 class="logo">PROJECT Z</h1>

    <div class="header-buttons">
        <a href="{{ url_for('home') }}" class="btn-back">BACK</a>
    </div>
</header>

<img class="image-gradient" src="{{ url_for('static', filename='gradient.png') }}" alt="gradient">
<div class="layer-blur"></div>

<div class="container">
    <h1>❌⭕ Tic Tac Toe</h1>
    <div class="status" id="status">Turn: X</div>
    <div class="grid" id="grid"></div>
    <button class="reset" id="resetBtn">Restart</button>
</div>

<!-- ✅ POPUP -->
<div id="popup" class="popup hidden">
    <div class="popup-content">
        <h2 id="popup-message"></h2>
        <button id="playAgainBtn">Play Again</button>
    </div>
</div>

<script src="{{ url_for('static', filename='game.js') }}"></script>
</body>
</html>
