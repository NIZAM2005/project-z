<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Notes Summarizer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='summarizer.css') }}">
</head>
<body>

<!-- HEADER -->
<header>
    <div class="logo">PROJECT Z</div>

    <div class="header-buttons">
        <a href="/" class="btn-back">BACK</a>
    </div>
</header>

<div class="container">
    <h1>🧾 AI Text Summarizer</h1>

    <textarea id="inputText" placeholder="Paste your notes here..."></textarea>

    <div class="controls">
        <button onclick="summarizeText()">Summarize Text</button>
        <button onclick="triggerFile()">Summarize File</button>
    </div>

    <input type="file" id="fileInput" accept=".pdf,.docx" style="display:none;">

    <div id="output-box">
        <h3>Summary:</h3>
        <pre id="output">Your summary will appear here...</pre>
        <p id="stats"></p>
        <button onclick="copyText()">Copy</button>
    </div>
</div>

<script src="{{ url_for('static', filename='summarizer.js') }}"></script>
</body>
</html>
